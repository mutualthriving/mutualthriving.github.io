<!-- Callout box with gradient background -->
<!-- Usage: {% include callout.html title="Title" content="Your content here" %} -->
<!-- Or with capture for complex content:
{% capture callout_content %}
Your **markdown** content here
- List item 1
- List item 2
{% endcapture %}
{% include callout.html title="Title" content=callout_content %}
-->
<div class="manifesto-callout">
    {% if include.title %}<h3>{{ include.title }}</h3>{% endif %}
    {{ include.content | markdownify }}
</div>
